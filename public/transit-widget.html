<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <title>מסלולי תחבורה ציבורית</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@400;500;600;700&display=swap');

      :root {
        --blue: #1a73e8;
        --blue-light: #e8f0fe;
        --blue-mid: #4285f4;
        --green: #0f9d58;
        --green-light: #e6f4ea;
        --orange: #f4511e;
        --orange-light: #fce8e6;
        --gray-bg: #f1f3f4;
        --gray-text: #5f6368;
        --gray-border: #dadce0;
        --text: #202124;
        --surface: #ffffff;
        --shadow-sm: 0 1px 3px rgba(60,64,67,.15), 0 1px 2px rgba(60,64,67,.3);
        --shadow-md: 0 2px 6px rgba(60,64,67,.15), 0 1px 4px rgba(60,64,67,.2);
        --shadow-lg: 0 4px 16px rgba(60,64,67,.12), 0 2px 8px rgba(60,64,67,.1);
        font-family: 'Noto Sans Hebrew', system-ui, -apple-system, sans-serif;
        color: var(--text);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        padding: 0;
        background: var(--gray-bg);
        min-height: 100vh;
      }

      /* ─── TOP SEARCH PANEL ─── */
      .search-panel {
        background: var(--surface);
        box-shadow: var(--shadow-md);
        padding: 16px;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .search-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .search-header svg {
        flex-shrink: 0;
      }

      .search-header-text h1 {
        font-size: 1rem;
        font-weight: 600;
        margin: 0;
        color: var(--text);
        letter-spacing: -0.01em;
      }

      .search-header-text p {
        font-size: 0.78rem;
        color: var(--gray-text);
        margin: 2px 0 0;
        line-height: 1.4;
      }

      /* Route input row with dot-line-dot visual */
      .route-inputs {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 0;
        margin-bottom: 12px;
      }

      .route-connector {
        position: absolute;
        right: 17px;
        top: 42px;
        bottom: 42px;
        width: 2px;
        background: repeating-linear-gradient(
          to bottom,
          var(--gray-border) 0px,
          var(--gray-border) 4px,
          transparent 4px,
          transparent 8px
        );
        z-index: 1;
      }

      .route-field {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--gray-bg);
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 10px 12px;
        transition: border-color 0.15s, background 0.15s;
        margin-bottom: 6px;
      }

      .route-field:focus-within {
        background: white;
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(26,115,232,.12);
      }

      .route-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
        z-index: 2;
        position: relative;
      }

      .route-dot.origin {
        background: white;
        border: 2.5px solid var(--blue);
      }

      .route-dot.dest {
        background: var(--orange);
        border: 2.5px solid var(--orange);
      }

      .route-field input {
        flex: 1;
        border: none;
        background: transparent;
        font-size: 0.95rem;
        font-family: inherit;
        color: var(--text);
        outline: none;
        padding: 0;
        min-width: 0;
      }

      .route-field input::placeholder {
        color: #9aa0a6;
        font-size: 0.88rem;
      }

      .field-label {
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--gray-text);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        white-space: nowrap;
        min-width: 28px;
        text-align: center;
      }

      .search-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 20px;
        padding: 9px 18px;
        font-size: 0.88rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.15s, box-shadow 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      #submit-button {
        background: var(--blue);
        color: white;
        box-shadow: var(--shadow-sm);
      }

      #submit-button:hover:not(:disabled) {
        background: #1557b0;
        box-shadow: var(--shadow-md);
      }

      #submit-button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      #use-current-location-button {
        background: var(--blue-light);
        color: var(--blue);
        border: 1px solid #c5d8fb;
      }

      #use-current-location-button:hover:not(:disabled) {
        background: #d2e3fc;
      }

      #use-current-location-button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .hint {
        font-size: 0.78rem;
        color: var(--gray-text);
        line-height: 1.5;
        margin-top: 10px;
        padding: 8px 10px;
        background: var(--gray-bg);
        border-radius: 6px;
      }

      .error {
        color: #c62828;
        background: #fce8e6;
        border: 1px solid #f8bdb0;
        border-radius: 8px;
        padding: 10px 12px;
        margin-top: 10px;
        display: none;
        font-size: 0.88rem;
        line-height: 1.45;
      }

      /* ─── MAIN CONTENT ─── */
      main {
        max-width: 700px;
        margin: 0 auto;
        padding: 16px 12px 32px;
      }

      /* ─── SUMMARY CARD ─── */
      .summary-card {
        background: var(--surface);
        border-radius: 12px;
        box-shadow: var(--shadow-sm);
        padding: 14px 16px;
        margin-bottom: 10px;
        border-right: 4px solid var(--blue);
      }

      .summary-route-line {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 8px;
      }

      .summary-route-line .arrow {
        color: var(--gray-text);
        font-weight: 400;
      }

      .summary-text {
        font-size: 0.88rem;
        color: var(--gray-text);
        line-height: 1.55;
        margin-bottom: 8px;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .pill {
        background: var(--gray-bg);
        border: 1px solid var(--gray-border);
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 0.78rem;
        color: var(--gray-text);
        font-weight: 500;
      }

      .source-note {
        margin-top: 8px;
        color: #9aa0a6;
        font-size: 0.76rem;
      }

      /* ─── ROUTE CARD ─── */
      .card {
        background: var(--surface);
        border-radius: 12px;
        box-shadow: var(--shadow-sm);
        padding: 0;
        margin-bottom: 10px;
        overflow: hidden;
        transition: box-shadow 0.2s;
      }

      .card:hover {
        box-shadow: var(--shadow-lg);
      }

      /* Route card header */
      .route-header {
        padding: 14px 16px 10px;
        border-bottom: 1px solid var(--gray-border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }

      .route-title-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .route-num-badge {
        background: var(--blue);
        color: white;
        font-size: 0.72rem;
        font-weight: 700;
        border-radius: 6px;
        padding: 3px 7px;
        letter-spacing: 0.03em;
      }

      .route-header h2 {
        font-size: 0.95rem;
        font-weight: 600;
        margin: 0;
        color: var(--text);
      }

      .route-time-block {
        text-align: left;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: var(--green-light);
        color: var(--green);
        border-radius: 20px;
        padding: 4px 10px;
        font-size: 0.82rem;
        font-weight: 700;
        white-space: nowrap;
      }

      .route-times {
        font-size: 0.78rem;
        color: var(--gray-text);
        margin-top: 3px;
      }

      /* Route meta pills */
      .route-meta {
        padding: 8px 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        border-bottom: 1px solid var(--gray-border);
      }

      .pill-bus {
        background: #e3f2fd;
        color: #0d47a1;
        border-color: #bbdefb;
      }

      .pill-walk {
        background: var(--green-light);
        color: #2e7d32;
        border-color: #c8e6c9;
      }

      .pill-rail {
        background: #f3e5f5;
        color: #6a1b9a;
        border-color: #e1bee7;
      }

      /* ─── TIMELINE STEPS ─── */
      .steps-list {
        list-style: none;
        margin: 0;
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .step-item {
        display: flex;
        gap: 14px;
        position: relative;
      }

      /* Vertical connector line between steps */
      .step-item:not(:last-child) .step-line {
        position: absolute;
        right: 15px;
        top: 26px;
        bottom: -8px;
        width: 2px;
        background: var(--gray-border);
        z-index: 0;
      }

      .step-item.mode-BUS:not(:last-child) .step-line { background: #1565c0; }
      .step-item.mode-RAIL:not(:last-child) .step-line { background: #6a1b9a; }
      .step-item.mode-WALK:not(:last-child) .step-line {
        background: repeating-linear-gradient(
          to bottom,
          #9aa0a6 0px, #9aa0a6 4px, transparent 4px, transparent 8px
        );
      }

      .step-icon {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 0.75rem;
        font-weight: 800;
        position: relative;
        z-index: 1;
        margin-top: 2px;
        letter-spacing: -0.02em;
        box-shadow: var(--shadow-sm);
      }

      .mode-BUS .step-icon    { background: #1565c0; color: white; }
      .mode-RAIL .step-icon   { background: #6a1b9a; color: white; }
      .mode-WALK .step-icon   { background: #e8eaed; color: #5f6368; }

      .step-body {
        flex: 1;
        padding-bottom: 18px;
      }

      .step-item:last-child .step-body {
        padding-bottom: 4px;
      }

      .step-main {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text);
        line-height: 1.4;
        margin-bottom: 2px;
      }

      .step-route-tag {
        display: inline-block;
        background: #1a73e8;
        color: white;
        border-radius: 4px;
        font-size: 0.7rem;
        font-weight: 700;
        padding: 1px 5px;
        margin-inline-end: 4px;
        vertical-align: middle;
      }

      .step-route-tag.rail { background: #6a1b9a; }

      .step-sub {
        font-size: 0.78rem;
        color: var(--gray-text);
        line-height: 1.5;
        margin-top: 1px;
      }

      .step-station-codes {
        font-size: 0.74rem;
        color: #9aa0a6;
        margin-top: 2px;
      }

      .realtime-dot {
        display: inline-block;
        width: 7px;
        height: 7px;
        background: var(--green);
        border-radius: 50%;
        margin-inline-end: 4px;
        vertical-align: middle;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      /* ─── ALERTS ─── */
      .alerts {
        margin: 0;
        padding: 10px 16px 14px;
        border-top: 1px solid var(--gray-border);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .alerts-title {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--orange);
        margin-bottom: 2px;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .alert {
        background: var(--orange-light);
        color: #bf360c;
        border: 1px solid #f8bdb0;
        border-radius: 8px;
        padding: 7px 10px;
        font-size: 0.82rem;
        line-height: 1.45;
      }

      /* ─── EMPTY / LOADING ─── */
      .empty {
        text-align: center;
        padding: 40px 20px;
        color: var(--gray-text);
        background: var(--surface);
        border-radius: 12px;
        box-shadow: var(--shadow-sm);
      }

      .empty-icon {
        font-size: 2.5rem;
        margin-bottom: 10px;
        display: block;
        opacity: 0.4;
      }

      .empty p {
        margin: 0;
        font-size: 0.9rem;
      }

      .loading body { opacity: 0.65; pointer-events: none; }

      /* ─── RESPONSIVE ─── */
      @media (min-width: 600px) {
        .search-panel { padding: 16px 20px; }
        .route-inputs { flex-direction: row; gap: 8px; }
        .route-connector { display: none; }
        .route-field { margin-bottom: 0; flex: 1; }
      }
    </style>
  </head>

  <body>

    <!-- Search Panel -->
    <div class="search-panel">
      <div class="search-header">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z" fill="#1a73e8"/></svg>
        <div class="search-header-text">
          <h1>מסלולי תחבורה ציבורית</h1>
          <p>התוצאה הראשונית מגיעה מהשיחה — ניתן לשנות מוצא/יעד ולחשב מחדש</p>
        </div>
      </div>

      <form id="route-form">
        <div class="route-inputs">
          <div class="route-connector"></div>
          <div class="route-field">
            <div class="route-dot origin"></div>
            <span class="field-label">מ׳</span>
            <input id="from-input" name="from" placeholder="מיקום נוכחי, או הזן מוצא" autocomplete="off" />
          </div>
          <div class="route-field">
            <div class="route-dot dest"></div>
            <span class="field-label">אל</span>
            <input id="to-input" name="to" required placeholder="לדוגמה: אמציה 3 ירושלים" autocomplete="off" />
          </div>
        </div>
        <div class="search-actions">
          <button id="submit-button" type="submit">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            מצא מסלול
          </button>
          <button id="use-current-location-button" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
            מיקום נוכחי
          </button>
        </div>
        <div class="hint">שדה מוצא ריק → יופעל מיקום ש־ChatGPT העביר. לחיצה על "מיקום נוכחי" תשלח קואורדינטות GPS אמיתיות.</div>
        <div id="error-box" class="error"></div>
      </form>
    </div>

    <main>
      <section id="results"></section>
    </main>

    <script type="module">
      const form = document.querySelector("#route-form");
      const fromInput = document.querySelector("#from-input");
      const toInput = document.querySelector("#to-input");
      const submitButton = document.querySelector("#submit-button");
      const useCurrentLocationButton = document.querySelector("#use-current-location-button");
      const results = document.querySelector("#results");
      const errorBox = document.querySelector("#error-box");

      let latestData = null;
      let currentLatLon = null;

      function getBridge() {
        return window.openai ?? null;
      }

      function showError(message) {
        errorBox.textContent = message;
        errorBox.style.display = "block";
      }

      function clearError() {
        errorBox.textContent = "";
        errorBox.style.display = "none";
      }

      function setLoading(isLoading) {
        submitButton.disabled = isLoading;
        useCurrentLocationButton.disabled = isLoading;
        submitButton.textContent = isLoading ? "מחפש..." : "מצא מסלול";
        document.body.classList.toggle("loading", isLoading);
      }

      function modeLabel(step) {
        if (step.mode === "WALK") return "הליכה";
        if (step.mode === "BUS") return `קו ${step.route ?? ""}`.trim();
        if (step.mode === "RAIL") return `רכבת ${step.route ?? ""}`.trim();
        return step.mode ?? "שלב";
      }

      function locationSourceLabel(source) {
        if (source === "from_query") return "מוצא ידני";
        if (source === "explicit_arguments") return "קואורדינטות מפורשות / GPS";
        if (source === "openai_userLocation_meta") return "מיקום נוכחי מ־ChatGPT";
        return source ?? "לא ידוע";
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function modeIcon(mode) {
        if (mode === "WALK") return "🚶";
        if (mode === "BUS")  return "🚌";
        if (mode === "RAIL") return "🚆";
        return "🔄";
      }

      function pillClass(mode) {
        if (mode === "BUS")  return "pill pill-bus";
        if (mode === "RAIL") return "pill pill-rail";
        if (mode === "WALK") return "pill pill-walk";
        return "pill";
      }

      function renderItinerary(itinerary) {
        const routesText =
          itinerary.routes && itinerary.routes.length > 0
            ? itinerary.routes.join(" → ")
            : "ללא קווים";

        const steps = itinerary.steps ?? [];
        const stepsHtml = steps.map((step, idx) => {
            const isLast = idx === steps.length - 1;
            const stationCodes = [
              step.stopCodeFrom ? `עלייה ${step.stopCodeFrom}` : "",
              step.stopCodeTo   ? `ירידה ${step.stopCodeTo}`   : "",
            ].filter(Boolean).join(" · ");

            const routeTag = (step.mode === "BUS" || step.mode === "RAIL") && step.route
              ? `<span class="step-route-tag${step.mode === "RAIL" ? " rail" : ""}">${escapeHtml(step.route)}</span>`
              : "";

            const realtimeDot = step.realtime
              ? `<span class="realtime-dot" title="זמן אמת"></span>`
              : "";

            return `
              <li class="step-item mode-${escapeHtml(step.mode ?? "OTHER")}">
                ${!isLast ? '<div class="step-line"></div>' : ""}
                <div class="step-icon">${modeIcon(step.mode)}</div>
                <div class="step-body">
                  <div class="step-main">
                    ${routeTag}${escapeHtml(step.from)} ← ${escapeHtml(step.to)}
                  </div>
                  <div class="step-sub">
                    ${realtimeDot}${escapeHtml(step.startTime)}–${escapeHtml(step.endTime)}
                    · ${escapeHtml(step.durationMinutes)} דק׳
                    ${step.distanceMeters ? `· ${escapeHtml(step.distanceMeters)} מ׳` : ""}
                    ${step.agency ? `· ${escapeHtml(step.agency)}` : ""}
                  </div>
                  ${stationCodes ? `<div class="step-station-codes">${escapeHtml(stationCodes)}</div>` : ""}
                </div>
              </li>`;
          }).join("");

        const alertsHtml = (itinerary.alerts ?? [])
          .map((alert) => `<div class="alert">${escapeHtml(alert)}</div>`)
          .join("");

        // Collect unique transport modes for meta pills
        const modes = [...new Set((itinerary.steps ?? []).map(s => s.mode).filter(Boolean))];
        const modePills = modes.map(m => `<span class="${pillClass(m)}">${modeLabel({mode: m})}</span>`).join("");

        return `
          <article class="card">
            <div class="route-header">
              <div class="route-title-group">
                <span class="route-num-badge">מסלול ${escapeHtml(itinerary.index)}</span>
                <h2>${escapeHtml(itinerary.startTime)} – ${escapeHtml(itinerary.endTime)}</h2>
              </div>
              <div class="route-time-block">
                <span class="badge">⏱ ${escapeHtml(itinerary.durationMinutes)} דק׳</span>
                <div class="route-times">הליכה ${escapeHtml(itinerary.walkDistanceMeters)} מ׳ · ${escapeHtml(itinerary.transfers)} החלפות · ${escapeHtml(itinerary.fareText)}</div>
              </div>
            </div>

            <div class="route-meta">
              ${modePills}
              <span class="pill">קווים: ${escapeHtml(routesText)}</span>
            </div>

            <ul class="steps-list">${stepsHtml}</ul>

            ${alertsHtml ? `<div class="alerts"><div class="alerts-title">⚠ התראות</div>${alertsHtml}</div>` : ""}
          </article>`;
      }

      function renderResults(data) {
        latestData = data;

        if (!data || !Array.isArray(data.itineraries)) {
          results.innerHTML = `<div class="empty"><span class="empty-icon">🚌</span><p>אין עדיין תוצאות להצגה</p></div>`;
          return;
        }

        const fromName = data.from?.name ?? "";
        const toName   = data.to?.name   ?? "";

        results.innerHTML = `
          <div class="summary-card">
            <div class="summary-route-line">
              <span>${escapeHtml(fromName)}</span>
              <span class="arrow">→</span>
              <span>${escapeHtml(toName)}</span>
            </div>
            <div class="summary-text">${escapeHtml(data.summary ?? "")}</div>
            <div class="meta">
              <span class="pill">מקור: ${escapeHtml(locationSourceLabel(data.usedLocationSource))}</span>
            </div>
            <div class="source-note">ניתן לשנות מוצא או יעד בחיפוש למעלה ולחשב מחדש.</div>
          </div>

          ${data.itineraries.map(renderItinerary).join("")}
        `;
      }

      function hydrateInputsFromInitialData(data) {
        if (!data) return;

        if (data.to?.name && !toInput.value.trim()) {
          toInput.value = data.to.name;
        }

        if (data.usedLocationSource === "from_query" && data.from?.name && !fromInput.value.trim()) {
          fromInput.value = data.from.name;
        }

        if (data.usedLocationSource !== "from_query") {
          fromInput.placeholder = data.from?.name
            ? `מיקום נוכחי: ${data.from.name} — אפשר להקליד מוצא אחר`
            : "להשאיר ריק למיקום הנוכחי, או להזין מוצא אחר";
        }
      }

      function readToolOutputFromBridge() {
        const bridge = getBridge();
        return bridge?.toolOutput ?? null;
      }

      function applyInitialToolOutput() {
        const output = readToolOutputFromBridge();

        if (output && output !== latestData) {
          renderResults(output);
          hydrateInputsFromInitialData(output);
          return true;
        }

        return false;
      }

      async function callDirections(args) {
        const bridge = getBridge();

        if (!bridge || typeof bridge.callTool !== "function") {
          throw new Error("הממשק עדיין לא מחובר ל־ChatGPT bridge. זה יעבוד רק כשה־UI פתוח מתוך ChatGPT.");
        }

        return bridge.callTool("get_transit_directions", args);
      }

      function buildArgsFromInputs() {
        const fromQuery = fromInput.value.trim();
        const toQuery = toInput.value.trim();

        if (!toQuery) {
          throw new Error("צריך להזין יעד.");
        }

        const args = {
          toQuery,
          locale: "he",
          numItineraries: 3,
          maxWalkDistance: 1207,
        };

        if (fromQuery) {
          args.fromQuery = fromQuery;
        } else if (currentLatLon) {
          args.fromLat = currentLatLon.lat;
          args.fromLon = currentLatLon.lon;
        }

        return args;
      }

      async function runSearch(args) {
        try {
          setLoading(true);
          clearError();

          const response = await callDirections(args);
          const data = response?.structuredContent ?? response;

          renderResults(data);
          hydrateInputsFromInitialData(data);
        } catch (error) {
          showError(error?.message ?? "אירעה שגיאה בחיפוש המסלול.");
        } finally {
          setLoading(false);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        try {
          const args = buildArgsFromInputs();
          await runSearch(args);
        } catch (error) {
          showError(error?.message ?? "אירעה שגיאה.");
        }
      });

      useCurrentLocationButton.addEventListener("click", () => {
        clearError();

        if (!navigator.geolocation) {
          showError("הדפדפן לא תומך בקבלת מיקום נוכחי.");
          return;
        }

        setLoading(true);
        useCurrentLocationButton.textContent = "מבקש מיקום...";

        navigator.geolocation.getCurrentPosition(
          async (position) => {
            currentLatLon = {
              lat: position.coords.latitude,
              lon: position.coords.longitude,
            };

            fromInput.value = "";
            fromInput.placeholder = `GPS נוכחי: ${currentLatLon.lat.toFixed(6)}, ${currentLatLon.lon.toFixed(6)}`;

            useCurrentLocationButton.textContent = "השתמש במיקום הנוכחי";

            const toQuery = toInput.value.trim();

            if (!toQuery) {
              setLoading(false);
              showError("המיקום נקלט. עכשיו הזן יעד ולחץ מצא מסלול.");
              return;
            }

            await runSearch({
              fromLat: currentLatLon.lat,
              fromLon: currentLatLon.lon,
              toQuery,
              locale: "he",
              numItineraries: 3,
              maxWalkDistance: 1207,
            });
          },
          (error) => {
            setLoading(false);
            useCurrentLocationButton.textContent = "השתמש במיקום הנוכחי";

            if (error.code === error.PERMISSION_DENIED) {
              showError("לא ניתנה הרשאה למיקום. אפשר לאשר מיקום בדפדפן, או להזין מוצא ידנית.");
              return;
            }

            showError("לא הצלחתי לקבל מיקום נוכחי. אפשר להזין מוצא ידנית.");
          },
          {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 30000,
          }
        );
      });

      window.addEventListener("openai:set_globals", (event) => {
        const globals = event?.detail?.globals;

        if (globals?.toolOutput) {
          renderResults(globals.toolOutput);
          hydrateInputsFromInitialData(globals.toolOutput);
        }
      });

      window.addEventListener("message", (event) => {
        const message = event.data;

        if (!message || message.jsonrpc !== "2.0") return;

        if (message.method === "ui/notifications/tool-result") {
          const data = message.params?.structuredContent;
          if (data) {
            renderResults(data);
            hydrateInputsFromInitialData(data);
          }
        }
      });

      function boot() {
        if (applyInitialToolOutput()) return;

        renderResults(null);

        setTimeout(applyInitialToolOutput, 100);
        setTimeout(applyInitialToolOutput, 500);
        setTimeout(applyInitialToolOutput, 1200);
      }

      boot();
    </script>
  </body>
</html>
