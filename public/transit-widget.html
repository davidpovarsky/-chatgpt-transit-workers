<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <title>מסלולי תחבורה ציבורית</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
        background: #f6f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        background: #f6f7fb;
      }

      main {
        max-width: 820px;
        margin: 0 auto;
      }

      .card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        padding: 18px;
        margin-bottom: 14px;
      }

      h1 {
        font-size: 1.25rem;
        margin: 0 0 8px;
      }

      .subtitle {
        color: #6b7280;
        margin: 0 0 16px;
        line-height: 1.5;
      }

      form {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 650;
      }

      input {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 11px 12px;
        font-size: 1rem;
        background: white;
      }

      input:focus {
        outline: 2px solid #2563eb33;
        border-color: #2563eb;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      @media (min-width: 700px) {
        .row {
          grid-template-columns: 1fr 1fr;
        }
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 1rem;
        font-weight: 750;
        background: #111827;
        color: white;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .secondary-button {
        background: #f3f4f6;
        color: #111827;
        border: 1px solid #e5e7eb;
      }

      .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .hint {
        font-size: 0.9rem;
        color: #6b7280;
        line-height: 1.45;
      }

      .summary {
        font-size: 1rem;
        line-height: 1.6;
      }

      .route-title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: baseline;
        margin-bottom: 10px;
      }

      .route-title h2 {
        font-size: 1.05rem;
        margin: 0;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        background: #eef2ff;
        color: #3730a3;
        padding: 4px 9px;
        font-size: 0.85rem;
        font-weight: 700;
        white-space: nowrap;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 8px 0 12px;
      }

      .pill {
        background: #f3f4f6;
        border-radius: 999px;
        padding: 5px 9px;
        font-size: 0.88rem;
        color: #374151;
      }

      ol {
        margin: 0;
        padding-inline-start: 22px;
      }

      li {
        margin: 9px 0;
        line-height: 1.45;
      }

      .step-main {
        font-weight: 700;
      }

      .step-sub {
        color: #6b7280;
        font-size: 0.9rem;
        margin-top: 2px;
      }

      .alerts {
        margin-top: 12px;
        border-top: 1px solid #e5e7eb;
        padding-top: 10px;
      }

      .alert {
        background: #fff7ed;
        color: #9a3412;
        border: 1px solid #fed7aa;
        border-radius: 12px;
        padding: 8px 10px;
        margin-top: 6px;
        font-size: 0.9rem;
      }

      .empty {
        color: #6b7280;
        text-align: center;
        padding: 22px;
      }

      .error {
        color: #991b1b;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 12px;
        padding: 10px 12px;
        margin-top: 12px;
        display: none;
        line-height: 1.45;
      }

      .source-note {
        margin-top: 8px;
        color: #6b7280;
        font-size: 0.88rem;
      }

      .loading {
        opacity: 0.72;
      }
    </style>
  </head>

  <body>
    <main>
      <section class="card">
        <h1>מסלולי תחבורה ציבורית</h1>

        <p class="subtitle">
          התוצאה הראשונית מגיעה מהשיחה. אפשר לשנות כאן מוצא או יעד ולחשב מסלול חדש בתוך הצ׳אט.
        </p>

        <form id="route-form">
          <div class="row">
            <label>
              מוצא
              <input
                id="from-input"
                name="from"
                placeholder="להשאיר ריק למיקום הנוכחי, או להזין מוצא אחר"
                autocomplete="off"
              />
            </label>

            <label>
              יעד
              <input
                id="to-input"
                name="to"
                required
                placeholder="לדוגמה: אמציה 3 ירושלים"
                autocomplete="off"
              />
            </label>
          </div>

          <div class="buttons">
            <button id="submit-button" type="submit">מצא מסלול</button>
            <button id="use-current-location-button" type="button" class="secondary-button">
              השתמש במיקום הנוכחי
            </button>
          </div>

          <div class="hint">
            אם שדה המוצא ריק, הכלי ינסה להשתמש במיקום ש־ChatGPT העביר. הכפתור “השתמש במיקום הנוכחי”
            מנסה לקבל GPS אמיתי מהדפדפן ולשלוח קואורדינטות לשרת.
          </div>

          <div id="error-box" class="error"></div>
        </form>
      </section>

      <section id="results"></section>
    </main>

    <script type="module">
      const form = document.querySelector("#route-form");
      const fromInput = document.querySelector("#from-input");
      const toInput = document.querySelector("#to-input");
      const submitButton = document.querySelector("#submit-button");
      const useCurrentLocationButton = document.querySelector("#use-current-location-button");
      const results = document.querySelector("#results");
      const errorBox = document.querySelector("#error-box");

      let latestData = null;
      let currentLatLon = null;

      function getBridge() {
        return window.openai ?? null;
      }

      function showError(message) {
        errorBox.textContent = message;
        errorBox.style.display = "block";
      }

      function clearError() {
        errorBox.textContent = "";
        errorBox.style.display = "none";
      }

      function setLoading(isLoading) {
        submitButton.disabled = isLoading;
        useCurrentLocationButton.disabled = isLoading;
        submitButton.textContent = isLoading ? "מחפש..." : "מצא מסלול";
        document.body.classList.toggle("loading", isLoading);
      }

      function modeLabel(step) {
        if (step.mode === "WALK") return "הליכה";
        if (step.mode === "BUS") return `קו ${step.route ?? ""}`.trim();
        if (step.mode === "RAIL") return `רכבת ${step.route ?? ""}`.trim();
        return step.mode ?? "שלב";
      }

      function locationSourceLabel(source) {
        if (source === "from_query") return "מוצא ידני";
        if (source === "explicit_arguments") return "קואורדינטות מפורשות / GPS";
        if (source === "openai_userLocation_meta") return "מיקום נוכחי מ־ChatGPT";
        return source ?? "לא ידוע";
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderItinerary(itinerary) {
        const routesText =
          itinerary.routes && itinerary.routes.length > 0
            ? itinerary.routes.join(" → ")
            : "ללא קווים";

        const stepsHtml = (itinerary.steps ?? [])
          .map((step) => {
            const stationCodes = [
              step.stopCodeFrom ? `תחנת עלייה ${step.stopCodeFrom}` : "",
              step.stopCodeTo ? `תחנת ירידה ${step.stopCodeTo}` : "",
            ]
              .filter(Boolean)
              .join(" · ");

            return `
              <li>
                <div class="step-main">
                  ${escapeHtml(modeLabel(step))}: ${escapeHtml(step.from)} ← ${escapeHtml(step.to)}
                </div>
                <div class="step-sub">
                  ${escapeHtml(step.startTime)}–${escapeHtml(step.endTime)}
                  · ${escapeHtml(step.durationMinutes)} דק׳
                  ${step.distanceMeters ? `· ${escapeHtml(step.distanceMeters)} מ׳` : ""}
                  ${step.agency ? `· ${escapeHtml(step.agency)}` : ""}
                  ${step.realtime ? "· זמן אמת" : ""}
                </div>
                ${stationCodes ? `<div class="step-sub">${escapeHtml(stationCodes)}</div>` : ""}
              </li>
            `;
          })
          .join("");

        const alertsHtml = (itinerary.alerts ?? [])
          .map((alert) => `<div class="alert">${escapeHtml(alert)}</div>`)
          .join("");

        return `
          <article class="card">
            <div class="route-title">
              <h2>מסלול ${escapeHtml(itinerary.index)}</h2>
              <span class="badge">${escapeHtml(itinerary.durationMinutes)} דק׳</span>
            </div>

            <div class="meta">
              <span class="pill">${escapeHtml(itinerary.startTime)}–${escapeHtml(itinerary.endTime)}</span>
              <span class="pill">קווים: ${escapeHtml(routesText)}</span>
              <span class="pill">הליכה: ${escapeHtml(itinerary.walkDistanceMeters)} מ׳</span>
              <span class="pill">החלפות: ${escapeHtml(itinerary.transfers)}</span>
              <span class="pill">מחיר: ${escapeHtml(itinerary.fareText)}</span>
            </div>

            <ol>${stepsHtml}</ol>

            ${
              alertsHtml
                ? `<div class="alerts"><strong>התראות:</strong>${alertsHtml}</div>`
                : ""
            }
          </article>
        `;
      }

      function renderResults(data) {
        latestData = data;

        if (!data || !Array.isArray(data.itineraries)) {
          results.innerHTML = `<section class="card empty">אין עדיין תוצאות להצגה.</section>`;
          return;
        }

        const fromName = data.from?.name ?? "";
        const toName = data.to?.name ?? "";

        results.innerHTML = `
          <section class="card summary">
            <strong>סיכום:</strong>
            <div>${escapeHtml(data.summary ?? "")}</div>

            <div class="meta">
              <span class="pill">מוצא: ${escapeHtml(fromName)}</span>
              <span class="pill">יעד: ${escapeHtml(toName)}</span>
              <span class="pill">מקור מוצא: ${escapeHtml(locationSourceLabel(data.usedLocationSource))}</span>
            </div>

            <div class="source-note">
              אפשר לשנות מוצא או יעד למעלה ולחשב מחדש.
            </div>
          </section>

          ${data.itineraries.map(renderItinerary).join("")}
        `;
      }

      function hydrateInputsFromInitialData(data) {
        if (!data) return;

        if (data.to?.name && !toInput.value.trim()) {
          toInput.value = data.to.name;
        }

        if (data.usedLocationSource === "from_query" && data.from?.name && !fromInput.value.trim()) {
          fromInput.value = data.from.name;
        }

        if (data.usedLocationSource !== "from_query") {
          fromInput.placeholder = data.from?.name
            ? `מיקום נוכחי: ${data.from.name} — אפשר להקליד מוצא אחר`
            : "להשאיר ריק למיקום הנוכחי, או להזין מוצא אחר";
        }
      }

      function readToolOutputFromBridge() {
        const bridge = getBridge();
        return bridge?.toolOutput ?? null;
      }

      function applyInitialToolOutput() {
        const output = readToolOutputFromBridge();

        if (output && output !== latestData) {
          renderResults(output);
          hydrateInputsFromInitialData(output);
          return true;
        }

        return false;
      }

      async function callDirections(args) {
        const bridge = getBridge();

        if (!bridge || typeof bridge.callTool !== "function") {
          throw new Error("הממשק עדיין לא מחובר ל־ChatGPT bridge. זה יעבוד רק כשה־UI פתוח מתוך ChatGPT.");
        }

        return bridge.callTool("get_transit_directions", args);
      }

      function buildArgsFromInputs() {
        const fromQuery = fromInput.value.trim();
        const toQuery = toInput.value.trim();

        if (!toQuery) {
          throw new Error("צריך להזין יעד.");
        }

        const args = {
          toQuery,
          locale: "he",
          numItineraries: 3,
          maxWalkDistance: 1207,
        };

        if (fromQuery) {
          args.fromQuery = fromQuery;
        } else if (currentLatLon) {
          args.fromLat = currentLatLon.lat;
          args.fromLon = currentLatLon.lon;
        }

        return args;
      }

      async function runSearch(args) {
        try {
          setLoading(true);
          clearError();

          const response = await callDirections(args);
          const data = response?.structuredContent ?? response;

          renderResults(data);
          hydrateInputsFromInitialData(data);
        } catch (error) {
          showError(error?.message ?? "אירעה שגיאה בחיפוש המסלול.");
        } finally {
          setLoading(false);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        try {
          const args = buildArgsFromInputs();
          await runSearch(args);
        } catch (error) {
          showError(error?.message ?? "אירעה שגיאה.");
        }
      });

      useCurrentLocationButton.addEventListener("click", () => {
        clearError();

        if (!navigator.geolocation) {
          showError("הדפדפן לא תומך בקבלת מיקום נוכחי.");
          return;
        }

        setLoading(true);
        useCurrentLocationButton.textContent = "מבקש מיקום...";

        navigator.geolocation.getCurrentPosition(
          async (position) => {
            currentLatLon = {
              lat: position.coords.latitude,
              lon: position.coords.longitude,
            };

            fromInput.value = "";
            fromInput.placeholder = `GPS נוכחי: ${currentLatLon.lat.toFixed(6)}, ${currentLatLon.lon.toFixed(6)}`;

            useCurrentLocationButton.textContent = "השתמש במיקום הנוכחי";

            const toQuery = toInput.value.trim();

            if (!toQuery) {
              setLoading(false);
              showError("המיקום נקלט. עכשיו הזן יעד ולחץ מצא מסלול.");
              return;
            }

            await runSearch({
              fromLat: currentLatLon.lat,
              fromLon: currentLatLon.lon,
              toQuery,
              locale: "he",
              numItineraries: 3,
              maxWalkDistance: 1207,
            });
          },
          (error) => {
            setLoading(false);
            useCurrentLocationButton.textContent = "השתמש במיקום הנוכחי";

            if (error.code === error.PERMISSION_DENIED) {
              showError("לא ניתנה הרשאה למיקום. אפשר לאשר מיקום בדפדפן, או להזין מוצא ידנית.");
              return;
            }

            showError("לא הצלחתי לקבל מיקום נוכחי. אפשר להזין מוצא ידנית.");
          },
          {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 30000,
          }
        );
      });

      window.addEventListener("openai:set_globals", (event) => {
        const globals = event?.detail?.globals;

        if (globals?.toolOutput) {
          renderResults(globals.toolOutput);
          hydrateInputsFromInitialData(globals.toolOutput);
        }
      });

      window.addEventListener("message", (event) => {
        const message = event.data;

        if (!message || message.jsonrpc !== "2.0") return;

        if (message.method === "ui/notifications/tool-result") {
          const data = message.params?.structuredContent;
          if (data) {
            renderResults(data);
            hydrateInputsFromInitialData(data);
          }
        }
      });

      function boot() {
        if (applyInitialToolOutput()) return;

        renderResults(null);

        setTimeout(applyInitialToolOutput, 100);
        setTimeout(applyInitialToolOutput, 500);
        setTimeout(applyInitialToolOutput, 1200);
      }

      boot();
    </script>
  </body>
</html>
